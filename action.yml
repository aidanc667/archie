name: 'Archie Architecture Review'
description: 'AI-powered architecture and risk analysis for pull requests, grounded in a parsed dependency graph and powered by Claude'
author: 'aidanc667'
branding:
  icon: 'search'
  color: 'green'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key used to run the analysis'
    required: true
  github-token:
    description: 'Token used to post the PR comment'
    required: false
    default: ${{ github.token }}
  top-n:
    description: 'Number of top-risk files to review in detail'
    required: false
    default: '10'
  archie-ref:
    description: 'Git ref (tag/branch/sha) of the Archie tool to check out — pin this to a release for reproducible CI runs instead of always building the latest default branch'
    required: false
    default: 'main'
  fail-on-severity:
    description: "Minimum risk severity that fails the Archie check run: 'Critical', 'High', 'Medium', or 'none' to disable the merge gate"
    required: false
    default: 'none'

runs:
  using: 'composite'
  steps:
    - name: Checkout Archie
      uses: actions/checkout@v4
      with:
        repository: aidanc667/archie
        ref: ${{ inputs.archie-ref }}
        path: archie-tool

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache Archie tool dependencies
      uses: actions/cache@v4
      with:
        path: archie-tool/node_modules
        key: ${{ runner.os }}-archie-npm-${{ hashFiles('archie-tool/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-archie-npm-

    - name: Install Archie dependencies
      shell: bash
      working-directory: archie-tool
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
      run: npm ci

    - name: Build Archie
      shell: bash
      working-directory: archie-tool
      run: npm run build

    # Archie's parse cache (.archie-cache/parse-cache.json, in the target repo being
    # analyzed) is keyed internally by a sha256 hash of each file's content, so
    # restoring a stale or partial cache here is always safe: Archie will simply
    # recompute anything whose content hash doesn't match what's cached.
    - name: Cache Archie parse cache
      uses: actions/cache@v4
      with:
        path: .archie-cache
        key: ${{ runner.os }}-archie-parsecache-${{ github.event.pull_request.base.sha }}
        restore-keys: |
          ${{ runner.os }}-archie-parsecache-

    - name: Run Archie analysis
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: node archie-tool/dist/cli.js analyze . --topN ${{ inputs.top-n }} --diff ${{ github.event.pull_request.base.sha }} --json > archie-output.json

    - name: Post PR comment
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: node archie-tool/scripts/post-pr-comment.mjs archie-output.json

    - name: Post check status
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
      run: node archie-tool/scripts/post-check-status.mjs archie-output.json
